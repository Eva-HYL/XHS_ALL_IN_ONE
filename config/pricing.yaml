# Model pricing — updated 2026-07-17 per Phase 0 findings + console screenshots.
# All prices in CNY (¥).
# Cost calculation:
#   text = (input_tokens * input_yuan_per_million + output_tokens * output_yuan_per_million) / 1_000_000
#   image = image_count * yuan_per_image

text_models:
  qwen3.7-max:
    input_yuan_per_million_tokens: 2.5
    output_yuan_per_million_tokens: 7.5
    free_tokens: 1000000
    priority: 20
    capabilities: ["shotlist"]
  qwen3.7-plus:
    input_yuan_per_million_tokens: 0.4
    output_yuan_per_million_tokens: 1.6
    free_tokens: 1000000
    priority: 10
    capabilities: ["shotlist"]

image_models:
  # Currently-configured default (still an estimate — this specific SKU isn't
  # in the 2026-07-17 console screenshot; adjacent Seedream 4.0 is ¥0.20, 4.5
  # is ¥0.25, 5.0-lite is ¥0.22, 3.0-t2i is ¥0.259. 5.0 (non-lite) presumed
  # slightly higher.)
  doubao-seedream-5-0-260128:
    yuan_per_image: 0.26
    free_images: 0
    priority: 50
    capabilities: ["text_to_image", "reference_image"]
  # Seeded here for the Phase 1.5 quota-fallback plan; not called yet.
  doubao-seedream-4-0-250828:
    yuan_per_image: 0.20
    free_images: 200
    priority: 10
    capabilities: ["text_to_image", "reference_image"]
  doubao-seedream-4-5-251128:
    yuan_per_image: 0.25
    free_images: 200
    priority: 30
    capabilities: ["text_to_image", "reference_image"]
  doubao-seedream-5-0-lite:
    yuan_per_image: 0.22
    free_images: 50
    priority: 20
    capabilities: ["text_to_image", "reference_image"]
  doubao-seedream-3-0-t2i-250415:
    yuan_per_image: 0.259
    free_images: 200
    priority: 40
    capabilities: ["text_to_image"]

